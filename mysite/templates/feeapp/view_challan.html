<!DOCTYPE html>
{% load static %}
<html>
<head>
    <meta charset="UTF-8">
    <title>View Challan</title>
    <link rel="stylesheet" href="{% static 'feeapp/css/view_challan.css' %}">
</head>
<body>
    <div id="mainScreen" style="display: block;">
        <header> 
            {% if active_logo and active_logo.logo %}
            <img src="{{ active_logo.logo.url }}" alt="Logo" class="logo">
            {% endif %}
            <div class="college-name-container">
                <div class="college-name-header-text">
                    {{ active_logo.college_name }}
                </div>
            </div>
        </header>
        <div style="padding: 10px 20px;">
    <button onclick="history.back()" 
        style="background: #1e3a8a; color: white; border: none; padding: 10px 20px; 
               border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
               display: flex; align-items: center; gap: 8px;">
        &#8592; Back
    </button>
</div>
        <h2 class="view-challan-heading">Your Challans</h2>
        
        <div class="result-box" id="challanResult">
            <p style="text-align:center; color:#1e3a8a;">Loading your challans...</p>
        </div>
    
        <div id="challansListSection" style="display: none; margin-top: 20px; width: 70%;">
            <div id="challansList"></div>
        </div>

        <div id="challanViewModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto;">
            <div style="background: white; max-width: 1010px; margin: 30px auto; padding: 20px; border-radius: 10px; position: relative;">
                <button onclick="closeModal()" style="position: absolute; top: 10px; right: 15px; background: #dc2626; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Close</button>
                <div id="challanViewContent"></div>
                <div id="printButtonContainer" style="text-align: center; margin-top: 20px;"></div>
            </div>
        </div>
    </div>
    
    <script src="{% static 'feeapp/js/view_challan.js' %}"></script>
</body>
</html>
